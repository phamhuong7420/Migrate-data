<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Đăng nhập - Oracle Sync</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body class="login-body">
  <main class="layout-main login-main">
    <div class="login-card">
      <h1 class="login-title">C10</h1>

      {% if error %}
        <div class="msg error">{{ error }}</div>
      {% endif %}

      <div class="form-box">
        <form method="post" action="{{ url_for('login_page') }}?next={{ next | e }}">
          <div class="login-field">
            <input name="username" required autocomplete="off" class="login-input" placeholder="Username">
          </div>

          <div class="login-field">
            <input name="password" type="password" required autocomplete="current-password" class="login-input" placeholder="Password">
          </div>

          <div class="login-actions">
            <button type="submit" class="btn login-submit">Login</button>
          </div>

          <div class="login-links">
            <a href="{{ url_for('login_page') }}">Forgot Password?</a>
            <a href="{{ url_for('login_page') }}">Create an Account?</a>
          </div>
        </form>
      </div>
    </div>
  </main>
</body>
</html>
